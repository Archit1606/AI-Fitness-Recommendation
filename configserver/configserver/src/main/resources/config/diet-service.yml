spring:
  data:
    mongodb:
      uri: mongodb://localhost:27017/aidietfitness
      database: aidietfitness
    redis:
      host: localhost
      port: 6379
      timeout: 2s
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

server:
  port: 8084

cache:
  diet:
    ttl: 30m

gemini:
  api:
    key: ${GEMINI_KEY}
    url: ${GEMINI_URL}
