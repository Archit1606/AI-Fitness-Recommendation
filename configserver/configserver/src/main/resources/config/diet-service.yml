spring:
  data:
    mongodb:
      uri: mongodb://localhost:27017/aidietfitness
      database: aidietfitness

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

server:
  port: 8084

gemini:
  api:
    key: ${GEMINI_KEY}
    url: ${GEMINI_URL}
